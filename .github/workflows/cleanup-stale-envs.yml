name: Cleanup Stale PR Environments

on:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete stacks older than 24 hours
        run: |
          NOW=$(date +%s)
          CUTOFF=$((NOW - 86400))

          # Delete Lambda stacks first (they reference MockServer stack outputs)
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE \
            --query "StackSummaries[?starts_with(StackName, 'NYCaresLambdaStack-pr-')].[StackName,CreationTime]" \
            --output text | while read STACK_NAME CREATION_TIME; do
              [ -z "$STACK_NAME" ] && continue
              CREATE_EPOCH=$(date -d "$CREATION_TIME" +%s 2>/dev/null) || continue
              if [ "$CREATE_EPOCH" -lt "$CUTOFF" ]; then
                echo "Deleting stale stack: $STACK_NAME (created $CREATION_TIME)"
                aws cloudformation delete-stack --stack-name "$STACK_NAME" || true
                aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" 2>/dev/null || true
              fi
            done

          # Then delete MockServer stacks
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE \
            --query "StackSummaries[?starts_with(StackName, 'NYCaresMockServerStack-pr-')].[StackName,CreationTime]" \
            --output text | while read STACK_NAME CREATION_TIME; do
              [ -z "$STACK_NAME" ] && continue
              CREATE_EPOCH=$(date -d "$CREATION_TIME" +%s 2>/dev/null) || continue
              if [ "$CREATE_EPOCH" -lt "$CUTOFF" ]; then
                echo "Deleting stale stack: $STACK_NAME (created $CREATION_TIME)"
                aws cloudformation delete-stack --stack-name "$STACK_NAME" || true
                aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" 2>/dev/null || true
              fi
            done
