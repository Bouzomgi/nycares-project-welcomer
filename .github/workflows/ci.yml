name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Pre-pull Lambda runtime image
        run: docker pull public.ecr.aws/lambda/provided:al2023-x86_64
        timeout-minutes: 5

      - name: Start infrastructure
        env:
          LAMBDA_GOARCH: amd64
        run: docker compose up -d --wait
        timeout-minutes: 10

      - name: Wait for seed-s3 to complete
        run: docker compose wait seed-s3
        timeout-minutes: 5

      - name: Pre-warm Lambda containers
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        timeout-minutes: 10
        run: |
          echo '{}' > /tmp/payload.json
          for fn in login fetch-projects compute-message-to-send request-approval-to-send send-and-pin-message record-message notify-completion dlq-notifier approval-callback ses-forwarder; do
            aws --endpoint-url=http://localhost:4566 --region us-east-1 \
              --cli-read-timeout 300 \
              lambda invoke --function-name "$fn" --payload file:///tmp/payload.json \
              /tmp/warmup-$fn.json &
          done
          wait

      - name: Run integration tests
        env:
          INTEGRATION_TIMEOUT: 120s
        run: go test -tags integration -v -count=1 ./integration/
        timeout-minutes: 10

      - name: Tear down
        if: always()
        run: docker compose down
