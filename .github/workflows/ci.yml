name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only one integration run at a time — new runs queue, not cancel
    concurrency:
      group: integration
      cancel-in-progress: false
    env:
      ENV_SUFFIX: -ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build lambdas
        run: |
          for pkg in login fetchprojects computemessagetosend requestapprovaltosend sendandpinmessage recordmessage notifycompletion dlqnotifier approvalcallback sesforwarder; do
            mkdir -p lambda-build/$pkg
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lambda-build/$pkg/bootstrap ./lambda/$pkg &
          done
          mkdir -p lambda-build/mockserver
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lambda-build/mockserver/bootstrap ./internal/mockserver &
          wait

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Deploy test environment
        env:
          DEPLOY_MOCKSERVER: "true"
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
          NYCARES_LAMBDA_ARCH: amd64
          NYCARES_ACCOUNT_USERNAME: test
          NYCARES_ACCOUNT_PASSWORD: test
          NYCARES_AWS_SF_APPROVALSECRET: test-secret
        run: |
          cd infra
          go mod download
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
          cdk deploy --require-approval never --all

      - name: Seed S3
        env:
          S3_BUCKET_NAME: nycares-project-welcomer-messages-ci
        run: FILES_DIR=seed/s3Items bash seed/seed_s3.sh

      - name: Get MockServer URL
        id: env-outputs
        run: |
          MOCKSERVER_URL=$(aws cloudformation describe-stacks \
            --stack-name NYCaresMockServerStack-ci \
            --query "Stacks[0].Outputs[?OutputKey=='MockServerUrlOutput'].OutputValue" \
            --output text)
          echo "mockserver_url=$MOCKSERVER_URL" >> $GITHUB_OUTPUT

      - name: Run integration tests
        env:
          STATE_MACHINE_ARN: arn:aws:states:us-east-1:${{ secrets.AWS_ACCOUNT_ID }}:stateMachine:project-notifier-workflow-ci
          DYNAMO_TABLE_NAME: nycares-project-welcomer-notifications-ci
          MOCKSERVER_URL: ${{ steps.env-outputs.outputs.mockserver_url }}
          INTEGRATION_TIMEOUT: 300s
        run: go test -tags integration -v -count=1 ./integration/
        timeout-minutes: 10
