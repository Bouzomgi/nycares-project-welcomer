name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Only one integration run at a time — new runs queue, not cancel
    concurrency:
      group: integration
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      ENV_SUFFIX: -ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Build lambdas
        run: |
          for pkg in login fetchprojects routeproject computepreprojectmessage generatethankyoumessage requestapprovaltosend sendandpinmessage recordmessage notifycompletion dlqnotifier approvalcallback sesforwarder; do
            mkdir -p lambda-build/$pkg
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lambda-build/$pkg/bootstrap ./lambda/$pkg &
          done
          mkdir -p lambda-build/mockserver
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lambda-build/mockserver/bootstrap ./internal/mockserver &
          wait

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Deploy test environment
        env:
          DEPLOY_MOCKSERVER: "true"
          CDK_DEFAULT_ACCOUNT: ${{ steps.account.outputs.id }}
          CDK_DEFAULT_REGION: us-east-1
          NYCARES_LAMBDA_ARCH: amd64
          NYCARES_ACCOUNT_USERNAME: ${{ secrets.NYCARES_ACCOUNT_USERNAME }}
          NYCARES_ACCOUNT_PASSWORD: ${{ secrets.NYCARES_ACCOUNT_PASSWORD }}
          NYCARES_AWS_SF_APPROVALSECRET: ${{ secrets.NYCARES_AWS_SF_APPROVALSECRET }}
          GHA_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          cd infra
          go mod download
          STACK_STATUS=$(aws cloudformation describe-stacks --stack-name CDKToolkit \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STACK_STATUS" = "DOES_NOT_EXIST" ]; then
            cdk bootstrap aws://${{ steps.account.outputs.id }}/us-east-1
          fi
          cdk deploy --require-approval never --all

      - name: Seed S3
        env:
          S3_BUCKET_NAME: nycares-project-welcomer-messages-ci
        run: S3_FILES_DIR=seed/s3Items bash seed/seed_localstack.sh

      - name: Get MockServer URL
        id: env-outputs
        run: |
          MOCKSERVER_URL=$(aws cloudformation describe-stacks \
            --stack-name NYCaresMockServerStack-ci \
            --query "Stacks[0].Outputs[?OutputKey=='MockServerUrlOutput'].OutputValue" \
            --output text)
          echo "mockserver_url=$MOCKSERVER_URL" >> $GITHUB_OUTPUT

      - name: Pre-warm lambdas
        env:
          MOCKSERVER_URL: ${{ steps.env-outputs.outputs.mockserver_url }}
        run: |
          # Warm up the mock server lambda (avoids cold-start timeout on first test)
          curl -sf "${MOCKSERVER_URL%/}/" || true
          # Warm up workflow lambdas by invoking the state machine with a no-op and immediately stopping it
          EXEC_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn arn:aws:states:us-east-1:${{ steps.account.outputs.id }}:stateMachine:project-notifier-workflow-ci \
            --query executionArn --output text)
          sleep 5
          aws stepfunctions stop-execution --execution-arn "$EXEC_ARN" || true

      - name: Run integration tests
        env:
          STATE_MACHINE_ARN: arn:aws:states:us-east-1:${{ steps.account.outputs.id }}:stateMachine:project-notifier-workflow-ci
          DYNAMO_TABLE_NAME: nycares-project-welcomer-notifications-ci
          MOCKSERVER_URL: ${{ steps.env-outputs.outputs.mockserver_url }}
          INTEGRATION_TIMEOUT: 300s
        run: go test -tags integration -v -count=1 ./integration/
        timeout-minutes: 10
