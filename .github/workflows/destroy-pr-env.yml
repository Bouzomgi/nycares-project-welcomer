name: Destroy PR Environment

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      ENV_SUFFIX: -pr-${{ github.event.number }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Destroy PR environment
        run: |
          PR=${{ github.event.number }}
          # Delete Lambda stack first (references MockServer stack outputs)
          aws cloudformation delete-stack --stack-name NYCaresLambdaStack-pr-$PR 2>/dev/null || true
          aws cloudformation wait stack-delete-complete --stack-name NYCaresLambdaStack-pr-$PR 2>/dev/null || true
          # Then delete MockServer stack
          aws cloudformation delete-stack --stack-name NYCaresMockServerStack-pr-$PR 2>/dev/null || true
          aws cloudformation wait stack-delete-complete --stack-name NYCaresMockServerStack-pr-$PR 2>/dev/null || true
