name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build Lambdas
        run: |
          export CGO_ENABLED=0 GOOS=linux GOARCH=arm64
          for dir in login fetchprojects computemessagetosend requestapprovaltosend sendandpinmessage recordmessage notifycompletion dlqnotifier approvalcallback; do
            mkdir -p lambda-build/$dir
            go build -o lambda-build/$dir/bootstrap ./lambda/$dir
          done

      - name: Upsert Secrets Manager secret
        env:
          NYCARES_ACCOUNT_USERNAME: ${{ secrets.NYCARES_ACCOUNT_USERNAME }}
          NYCARES_ACCOUNT_PASSWORD: ${{ secrets.NYCARES_ACCOUNT_PASSWORD }}
          NYCARES_ACCOUNT_INTERNALID: ${{ secrets.NYCARES_ACCOUNT_INTERNALID }}
          NYCARES_AWS_SF_APPROVALSECRET: ${{ secrets.NYCARES_AWS_SF_APPROVALSECRET }}
        run: |
          SECRET_JSON=$(python3 -c "
          import json, os
          print(json.dumps({
            'NYCARES_ACCOUNT_USERNAME': os.environ['NYCARES_ACCOUNT_USERNAME'],
            'NYCARES_ACCOUNT_PASSWORD': os.environ['NYCARES_ACCOUNT_PASSWORD'],
            'NYCARES_ACCOUNT_INTERNALID': os.environ['NYCARES_ACCOUNT_INTERNALID'],
            'NYCARES_AWS_SF_APPROVALSECRET': os.environ['NYCARES_AWS_SF_APPROVALSECRET'],
          }))
          ")
          aws secretsmanager describe-secret --secret-id nycares-project-welcomer/secrets \
            && aws secretsmanager put-secret-value \
                --secret-id nycares-project-welcomer/secrets \
                --secret-string "$SECRET_JSON" \
            || aws secretsmanager create-secret \
                --name nycares-project-welcomer/secrets \
                --secret-string "$SECRET_JSON"

      - name: CDK Deploy
        working-directory: infra
        env:
          DEPLOY_MOCKSERVER: ${{ vars.DEPLOY_MOCKSERVER }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          NYCARES_MOCK_SENDMESSAGE: ${{ vars.DEPLOY_MOCKSERVER }}
          NYCARES_API_BASE_URL: ${{ vars.NYCARES_API_BASE_URL }}
        run: |
          go mod download
          cdk deploy --require-approval never --all
