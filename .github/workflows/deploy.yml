name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start infrastructure
        run: docker compose up -d --wait
        timeout-minutes: 10

      - name: Wait for seed-s3 to complete
        run: docker compose wait seed-s3
        timeout-minutes: 5

      - name: Run integration tests
        env:
          INTEGRATION_TIMEOUT: 60s
        run: go test -tags integration -v -count=1 ./integration/
        timeout-minutes: 5

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build Lambdas
        run: |
          export CGO_ENABLED=0 GOOS=linux GOARCH=arm64
          for dir in login fetchprojects computemessagetosend requestapprovaltosend sendandpinmessage recordmessage notifycompletion dlqnotifier approvalcallback; do
            mkdir -p lambda-build/$dir
            go build -o lambda-build/$dir/bootstrap ./lambda/$dir
          done

      - name: Upsert SSM parameters
        env:
          NYCARES_ACCOUNT_USERNAME: ${{ secrets.NYCARES_ACCOUNT_USERNAME }}
          NYCARES_ACCOUNT_PASSWORD: ${{ secrets.NYCARES_ACCOUNT_PASSWORD }}
          NYCARES_AWS_SF_APPROVALSECRET: ${{ secrets.NYCARES_AWS_SF_APPROVALSECRET }}
        run: |
          aws ssm put-parameter --name "/nycares-project-welcomer/NYCARES_ACCOUNT_USERNAME" --value "$NYCARES_ACCOUNT_USERNAME" --type SecureString --overwrite
          aws ssm put-parameter --name "/nycares-project-welcomer/NYCARES_ACCOUNT_PASSWORD" --value "$NYCARES_ACCOUNT_PASSWORD" --type SecureString --overwrite
          aws ssm put-parameter --name "/nycares-project-welcomer/NYCARES_AWS_SF_APPROVALSECRET" --value "$NYCARES_AWS_SF_APPROVALSECRET" --type SecureString --overwrite

      - name: CDK Deploy
        working-directory: infra
        env:
          DEPLOY_MOCKSERVER: ${{ vars.DEPLOY_MOCKSERVER }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          NYCARES_MOCK_SENDMESSAGE: ${{ vars.DEPLOY_MOCKSERVER }}
          NYCARES_API_BASE_URL: ${{ vars.NYCARES_API_BASE_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          go mod download
          cdk deploy --require-approval never --all
