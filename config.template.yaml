api:
  base_url: "https://www.newyorkcares.org" # Override for local dev (NYCARES_API_BASE_URL)

account:
  username: ""    # NYCARES_ACCOUNT_USERNAME
  password: ""    # NYCARES_ACCOUNT_PASSWORD

aws:
  credentials:
    accessKeyID: ""     # NYCARES_AWS_CREDENTIALS_ACCESSKEYID (optional, uses default AWS chain)
    secretAccessKey: "" # NYCARES_AWS_CREDENTIALS_SECRETACCESSKEY (optional)
    region: ""          # NYCARES_AWS_CREDENTIALS_REGION (optional)
  dynamo:
    tableName: "nycares-project-welcomer-notifications" # NYCARES_AWS_DYNAMO_TABLENAME
    region: "us-east-1"             # NYCARES_AWS_DYNAMO_REGION
    endpoint: "http://localhost:4566" # NYCARES_AWS_DYNAMO_ENDPOINT (LocalStack)
  s3:
    bucketName: "nycares-project-welcomer-messages" # NYCARES_AWS_S3_BUCKETNAME
    endpoint: "http://localhost:4566"     # NYCARES_AWS_S3_ENDPOINT (LocalStack)
  sns:
    topicArn: "arn:aws:sns:us-east-1:000000000000:nycares-notifications" # NYCARES_AWS_SNS_TOPICARN
  sf:
    callbackEndpoint: "" # NYCARES_AWS_SF_CALLBACKENDPOINT
    approvalSecret: ""   # NYCARES_AWS_SF_APPROVALSECRET (optional)

currentDate: "" # NYCARES_CURRENTDATE (optional, format: YYYY-MM-DD)

mock:
  sendMessage: false # NYCARES_MOCK_SENDMESSAGE - set to true to route SendAndPinMessage to the mock server
