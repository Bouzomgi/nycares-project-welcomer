name: nycares-project-welcomer

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    networks:
      localstack-network:
        ipv4_address: 10.5.0.5
    environment:
      - LOCALSTACK_HOST=localstack:4566
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=120
      - LAMBDA_DOCKER_NETWORK=nycares-project-welcomer_localstack-network
      - DEBUG=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 3

  mockserver:
    image: golang:latest
    volumes:
      - ./:/repo
    working_dir: /repo
    networks:
      localstack-network:
        ipv4_address: 10.5.0.6
    command: >
      sh -c "go mod download && go run ./internal/mockserver"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  build-lambdas:
    image: golang:latest
    volumes:
      - ./:/repo
      - ./lambda-build:/output
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    working_dir: /repo
    command: >
      sh -c "go mod download &&
             export CGO_ENABLED=0 GOOS=linux GOARCH=${LAMBDA_GOARCH:-arm64} &&
             mkdir -p /output/login /output/fetchprojects /output/computemessagetosend /output/requestapprovaltosend /output/sendandpinmessage /output/recordmessage /output/notifycompletion /output/dlqnotifier /output/approvalcallback /output/sesforwarder &&
             go build -o /output/login/bootstrap ./lambda/login &
             go build -o /output/fetchprojects/bootstrap ./lambda/fetchprojects &
             go build -o /output/computemessagetosend/bootstrap ./lambda/computemessagetosend &
             go build -o /output/requestapprovaltosend/bootstrap ./lambda/requestapprovaltosend &
             go build -o /output/sendandpinmessage/bootstrap ./lambda/sendandpinmessage &
             go build -o /output/recordmessage/bootstrap ./lambda/recordmessage &
             go build -o /output/notifycompletion/bootstrap ./lambda/notifycompletion &
             go build -o /output/dlqnotifier/bootstrap ./lambda/dlqnotifier &
             go build -o /output/approvalcallback/bootstrap ./lambda/approvalcallback &
             go build -o /output/sesforwarder/bootstrap ./lambda/sesforwarder &
             wait $(jobs -p) || exit 1"

  deploy-cdk:
    build: ./infra
    depends_on:
      localstack:
        condition: service_healthy
      seed-dynamo:
        condition: service_completed_successfully
      build-lambdas:
        condition: service_completed_successfully
      mockserver:
        condition: service_healthy
    networks:
      - localstack-network
    volumes:
      - ./infra:/infra
      - ./lambda-build:/lambda-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /infra
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ENDPOINT_URL_S3=http://s3.localstack:4566
      - NYCARES_API_BASE_URL=http://10.5.0.6:3001
      - NYCARES_CURRENT_DATE=${NYCARES_CURRENT_DATE:-}
      - NYCARES_ACCOUNT_USERNAME=user
      - NYCARES_ACCOUNT_PASSWORD=pass
      - NYCARES_AWS_SF_CALLBACKENDPOINT=http://localhost:4566
      - NYCARES_AWS_SF_APPROVALSECRET=test-secret
      - NYCARES_LAMBDA_ARCH=${LAMBDA_GOARCH:-arm64}
    command: >
      sh -c "go mod download &&
             cdklocal bootstrap &&
             cdklocal deploy --require-approval never --all"
    extra_hosts:
      - "cdk-hnb659fds-assets-000000000000-us-east-1.s3.localstack:10.5.0.5"

  seed-dynamo:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - localstack-network
    volumes:
      - ./seed:/seed
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    entrypoint: /bin/sh
    command: >
      -c "/seed/seed_dynamo.sh"

  seed-s3:
    image: amazon/aws-cli:latest
    depends_on:
      deploy-cdk:
        condition: service_completed_successfully
    networks:
      - localstack-network
    volumes:
      - ./seed:/seed
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    entrypoint: /bin/sh
    command: >
      -c "FILES_DIR=/seed/s3Items /seed/seed_s3.sh"

volumes:
  go-mod-cache:
  go-build-cache:

networks:
  localstack-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1
